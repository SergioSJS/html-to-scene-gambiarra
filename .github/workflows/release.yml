# Builds html-to-scene.zip (folder name = module id for Foundry) and publishes a GitHub Release
# when you push a version tag. Example:
#   git tag v1.3.3 && git push origin v1.3.3
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Match module.json version to tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(jq -r .version module.json)
          if [ "$TAG" != "$VER" ]; then
            echo "Tag is v${TAG} but module.json version is ${VER}. Bump module.json or fix the tag."
            exit 1
          fi

      - name: Package module
        run: |
          mkdir -p dist/html-to-scene
          cp module.json LICENSE README.md foundryvttaccess.html dist/html-to-scene/
          cp -r scripts templates lang dist/html-to-scene/
          (cd dist && zip -r ../html-to-scene.zip html-to-scene)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            html-to-scene.zip
            module.json
          generate_release_notes: true
